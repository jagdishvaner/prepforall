server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: api-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: prepforall-api
          service: api
          __path__: /var/log/prepforall/api/*.log

  - job_name: judge-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: prepforall-judge
          service: judge
          __path__: /var/log/prepforall/judge/*.log

  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
