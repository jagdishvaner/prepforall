limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=submit_limit:10m rate=5r/s;

upstream go_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name api.prepforall.com;

    # Redirect HTTP to HTTPS (SSL is terminated at ALB in production)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.prepforall.com;

    # SSL terminated at AWS ALB — these are placeholder paths
    ssl_certificate     /etc/ssl/certs/prepforall.crt;
    ssl_certificate_key /etc/ssl/private/prepforall.key;

    # WebSocket: sticky sessions handled at ALB level
    location /ws {
        proxy_pass http://go_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Submission endpoint: stricter rate limit (5/s per IP)
    location /api/v1/submissions {
        limit_req zone=submit_limit burst=10 nodelay;
        proxy_pass http://go_api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_limit burst=200 nodelay;
        proxy_pass http://go_api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Prometheus metrics: accessible only from internal network
    location /metrics {
        allow 10.0.0.0/8;
        deny all;
        proxy_pass http://go_api;
    }

    location /health {
        proxy_pass http://go_api;
        access_log off;
    }

    # Block internal routes from public access
    location /internal/ {
        deny all;
        return 403;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
