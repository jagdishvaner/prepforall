apiVersion: apps/v1
kind: Deployment
metadata:
  name: judge
  namespace: prepforall
  labels:
    app.kubernetes.io/name: judge
    app.kubernetes.io/component: judge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: judge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: judge
        app.kubernetes.io/component: judge
    spec:
      serviceAccountName: prepforall-judge
      terminationGracePeriodSeconds: 60
      containers:
        - name: judge
          image: prepforall-judge:latest
          envFrom:
            - configMapRef:
                name: judge-config
            - secretRef:
                name: judge-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
            - name: docker-data
              mountPath: /var/lib/docker
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep judge"
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: docker-data
          emptyDir: {}
      tolerations:
        - key: workload-type
          operator: Equal
          value: judge
          effect: NoSchedule
      nodeSelector:
        node-pool: judge
