apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: api-patch.yaml
    target:
      kind: Deployment
      name: api
  - path: judge-patch.yaml
    target:
      kind: Deployment
      name: judge

# Sealed secrets are committed separately — see Task 7
# They are referenced by name in base deployment envFrom
