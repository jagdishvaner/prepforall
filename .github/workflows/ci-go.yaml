name: Go CI

on:
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"
      - "services/judge/**"
      - ".github/workflows/ci-go.yaml"
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - "services/judge/**"
      - ".github/workflows/ci-go.yaml"

concurrency:
  group: ci-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      judge: ${{ steps.filter.outputs.judge }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            judge:
              - 'services/judge/**'

  lint-api:
    name: Lint API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: services/api

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prepforall
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: prepforall_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - name: Run tests
        working-directory: services/api
        env:
          DATABASE_URL: postgres://prepforall:testpassword@localhost:5432/prepforall_test?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test ./... -race -coverprofile=coverage.out -timeout 120s
      - name: Check coverage >= 70%
        working-directory: services/api
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${coverage}%"
          threshold=70
          if [ "$(echo "${coverage} < ${threshold}" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${coverage}% is below ${threshold}% threshold"
            exit 1
          fi
      - uses: codecov/codecov-action@v4
        with:
          file: services/api/coverage.out
          flags: api

  lint-judge:
    name: Lint Judge
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.judge == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/judge/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: services/judge

  test-judge:
    name: Test Judge
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.judge == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/judge/go.sum
      - name: Run tests
        working-directory: services/judge
        run: go test ./... -race -short -timeout 60s
