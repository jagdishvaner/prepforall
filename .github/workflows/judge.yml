name: Judge Worker CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/judge/**"
      - ".github/workflows/judge.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/judge/**"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: prepforall-judge

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/judge/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/judge

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/judge/go.sum
      - name: Run unit tests
        working-directory: services/judge
        run: go test ./... -short -timeout 30s

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push judge image
        uses: docker/build-push-action@v6
        with:
          context: ./services/judge
          file: ./services/judge/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push sandbox images
        working-directory: services/judge/docker/sandbox
        run: |
          for lang in cpp python java node; do
            docker build -f Dockerfile.$lang \
              -t ${{ steps.login-ecr.outputs.registry }}/prepforall/sandbox-$lang:latest .
            docker push ${{ steps.login-ecr.outputs.registry }}/prepforall/sandbox-$lang:latest
          done
      - name: Deploy judge workers via SSM
        run: |
          aws ssm send-command \
            --targets "Key=tag:Role,Values=judge" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest',
              'docker-compose -f /app/docker-compose.prod.yml up -d --no-deps --no-build judge'
            ]" \
            --timeout-seconds 300 \
            --region ${{ env.AWS_REGION }}
