name: API CI/CD

on:
  push:
    branches: [main]
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [main]
    paths:
      - "services/api/**"

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: prepforall-api

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: services/api
          version: latest

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prepforall
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: prepforall_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/api/go.sum
      - name: Run tests with race detector
        working-directory: services/api
        env:
          DATABASE_URL: postgres://prepforall:testpassword@localhost:5432/prepforall_test?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test ./... -race -coverprofile=coverage.out -timeout 60s
      - name: Check coverage threshold (>= 70%)
        working-directory: services/api
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: $coverage%"
          if (( $(echo "$coverage < 70" | bc -l) )); then
            echo "Coverage below 70%"
            exit 1
          fi
      - uses: codecov/codecov-action@v4
        with:
          file: services/api/coverage.out

  # ── Build & Push to ECR ───────────────────────────────────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          file: ./infrastructure/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Rolling Deploy to EC2 via SSM ─────────────────────────────────────────
  deploy:
    name: Deploy (Rolling)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Rolling deploy via SSM
        run: |
          aws ssm send-command \
            --targets "Key=tag:Role,Values=api" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest',
              'docker-compose -f /app/docker-compose.prod.yml up -d --no-deps --no-build api',
              'docker image prune -f'
            ]" \
            --timeout-seconds 300 \
            --output-s3-bucket-name prepforall-ssm-logs \
            --region ${{ env.AWS_REGION }}
